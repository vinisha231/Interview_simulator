# AWS Amplify: build Vite app in frontend/ and publish dist/.
# Set VITE_API_BASE_URL in the Amplify console to your API origin
# (e.g. https://your-env.region.elasticbeanstalk.com) — empty only if API is same host.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Use --prefix (not `cd frontend`) so BUILD phase always runs from repo root; Amplify can leave the shell cwd inside frontend after preBuild, which breaks a second `cd frontend`.
        - npm ci --prefix frontend
    build:
      commands:
        - npm run build --prefix frontend
  artifacts:
    baseDirectory: frontend/dist
    files:
      - "**/*"
  cache:
    paths:
      - frontend/node_modules/**/*
