version: 1
frontend:
  environment:
    variables:
      # Backend API (Elastic Beanstalk). Override in Amplify Console if your EB URL differs.
      VITE_API_BASE_URL: http://interview-sim-env-3.eba-rewftnct.us-east-1.elasticbeanstalk.com
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
